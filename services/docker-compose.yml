services:
  embeddings:
    build:
      context: ./models/embeddings
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: aabs-embeddings

    ports:
      - "8080:8080"

    environment:
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
      HF_TOKEN: ${HF_TOKEN}

    volumes:
      - ./data/models:/models

    restart: unless-stopped

    depends_on:
      - milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.18

    container_name: aabs-etcd

    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"

    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd

    volumes:
      - ./data/etcd:/etcd

    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: aabs-minio

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./data/minio:/data

    restart: unless-stopped
  milvus:
    build:
      context: ./databases/milvus
      dockerfile: Dockerfile

    container_name: aabs-milvus

    security_opt:
      - seccomp:unconfined

    depends_on:
      - etcd
      - minio

    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin

    ports:
      - "19530:19530"
      - "9091:9091"

    volumes:
      - ./data/milvus:/var/lib/milvus

    restart: unless-stopped

  hdbscan:
    build:
      context: ./models/hdbscan
      dockerfile: Dockerfile

    container_name: aabs-hdbscan

    ports:
      - "8090:8090"

    restart: unless-stopped

    depends_on:
      - milvus
      - embeddings

  postgresql:
    build:
      context: ./databases/postgresql
      dockerfile: Dockerfile

    container_name: aabs-postgresql

    environment:
      POSTGRES_USER: aabs
      POSTGRES_PASSWORD: aabs
      POSTGRES_DB: aabs

    ports:
      - "5432:5432"

    volumes:
      - ./data/postgresql:/var/lib/postgresql/data

    restart: unless-stopped

  llm:
    build:
      context: ./models/llm
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: aabs-llm

    ports:
      - "8100:8100"

    environment:
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
      HF_TOKEN: ${HF_TOKEN}

    volumes:
      - ./data/models:/models

    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph:latest

    container_name: aabs-memgraph

    ports:
      - "7687:7687"
      - "7444:7444"
      - "3000:3000"

    volumes:
      - ./data/memgraph:/var/lib/memgraph

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: aabs-redis

    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction

    ports:
      - "6379:6379"

    volumes:
      - ./data/redis:/data

    restart: unless-stopped