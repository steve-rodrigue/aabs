services:
  embeddings:
    build:
      context: ./models/embeddings
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: aabs-embeddings

    ports:
      - "8080:8080"

    environment:
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
      HF_TOKEN: ${HF_TOKEN}

    volumes:
      - ./data/models:/models

    restart: unless-stopped

    depends_on:
      - milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.18

    container_name: aabs-etcd

    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"

    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd

    volumes:
      - ./data/etcd:/etcd

    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: aabs-minio

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./data/minio:/data

    restart: unless-stopped
  milvus:
    build:
      context: ./databases/milvus
      dockerfile: Dockerfile

    container_name: aabs-milvus

    security_opt:
      - seccomp:unconfined

    depends_on:
      - etcd
      - minio

    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin

    ports:
      - "19530:19530"
      - "9091:9091"

    volumes:
      - ./data/milvus:/var/lib/milvus

    restart: unless-stopped

  hdbscan:
    build:
      context: ./models/hdbscan
      dockerfile: Dockerfile

    container_name: aabs-hdbscan

    ports:
      - "8090:8090"

    restart: unless-stopped

    depends_on:
      - milvus
      - embeddings

  postgresql:
    build:
      context: ./databases/postgresql
      dockerfile: Dockerfile

    container_name: aabs-postgresql

    environment:
      POSTGRES_USER: aabs
      POSTGRES_PASSWORD: aabs
      POSTGRES_DB: aabs

    ports:
      - "5432:5432"

    volumes:
      - ./data/postgresql:/var/lib/postgresql/data

    restart: unless-stopped

  llm:
    build:
      context: ./models/llm
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN}

    container_name: aabs-llm

    ports:
      - "8100:8100"

    environment:
      HF_HOME: /models
      TRANSFORMERS_CACHE: /models
      HF_TOKEN: ${HF_TOKEN}

    volumes:
      - ./data/models:/models

    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph:latest

    container_name: aabs-memgraph

    ports:
      - "7687:7687"
      - "7444:7444"
      - "3000:3000"

    volumes:
      - ./data/memgraph:/var/lib/memgraph

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: aabs-redis

    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction

    ports:
      - "6379:6379"

    volumes:
      - ./data/redis:/data

    restart: unless-stopped

  hatchet-postgresql:
    image: postgres:15.6

    container_name: aabs-hatchet-postgresql

    command: postgres -c 'max_connections=200'

    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
      POSTGRES_DB: hatchet

    ports:
      - "5435:5432"

    volumes:
      - ./data/hatchet/postgresql:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d hatchet -U hatchet"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  hatchet:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest

    container_name: aabs-hatchet

    ports:
      - "8888:8888"
      - "7077:7077"

    environment:
      DATABASE_URL: postgresql://hatchet:hatchet@hatchet-postgresql:5432/hatchet?sslmode=disable
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: localhost:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: localhost:7077

    volumes:
      - ./data/hatchet/config:/config

    depends_on:
      hatchet-postgresql:
        condition: service_healthy

    restart: unless-stopped
  posts-postgresql:
    image: postgres:15.6

    container_name: aabs-posts-postgresql

    environment:
      POSTGRES_USER: posts
      POSTGRES_PASSWORD: posts
      POSTGRES_DB: posts

    ports:
      - "5436:5432"

    volumes:
      - ./data/posts/postgresql:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d posts -U posts"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  posts-api:
    build:
      context: ./posts/restapis
      dockerfile: Dockerfile

    container_name: aabs-posts-api

    command: go run ./posts/restapis/cmd/posts-api start

    environment:
      POSTS_POSTGRES_DSN: postgres://posts:posts@posts-postgresql:5432/posts?sslmode=disable
      POSTS_API_ADDR: :8200
      POSTS_API_INSTALL_ON_START: "true"

      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN}
      HATCHET_CLIENT_HOST_PORT: hatchet:7077
      HATCHET_CLIENT_TLS_STRATEGY: none

    ports:
      - "8200:8200"

    depends_on:
      posts-postgresql:
        condition: service_healthy
      hatchet:
        condition: service_started

    restart: unless-stopped